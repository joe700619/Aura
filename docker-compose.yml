services:
  db:
    image: pgvector/pgvector:pg16
    container_name: aura_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-aura_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - aura_db_data:/var/lib/postgresql/data
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aura_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - aura_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    container_name: aura_web
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
      - aura_media:/app/media
      - aura_static:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60 --reload"

  celery_worker:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    container_name: aura_celery_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
      - aura_media:/app/media
    depends_on:
      - redis
      - db
    command: celery -A config worker -l info

  celery_beat:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    container_name: aura_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
    command: celery -A config beat -l info

  nginx:
    image: nginx:1.27-alpine
    container_name: aura_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - aura_static:/app/staticfiles:ro
      - aura_media:/app/media:ro
    depends_on:
      - web

volumes:
  aura_db_data:
  aura_redis_data:
  aura_media:
  aura_static:
