<header class="bg-white shadow">
    <div class="w-full py-4 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button @click="sidebarOpen = !sidebarOpen" class="p-2 rounded hover:bg-gray-100 focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                </svg>
            </button>
            <h2 class="font-semibold text-xl text-gray-800 leading-tight">
                {% block header %}{{ page_title|default:"Dashboard" }}{% endblock %}
            </h2>
        </div>
        <div class="flex items-center gap-3">
            <!-- User Avatar -->
            <div class="relative" x-data="{ open: false }" @click.away="open = false">
                <button @click="open = !open"
                    class="flex items-center gap-2 focus:outline-none group"
                    title="{{ request.user.get_full_name|default:request.user.username }}">
                    <div class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center text-white text-sm font-bold shadow-sm group-hover:bg-indigo-700 transition-colors select-none">
                        {{ request.user.get_full_name|slice:":1"|upper|default:request.user.username|slice:":1"|upper }}
                    </div>
                </button>

                <!-- Dropdown -->
                <div x-show="open" style="display:none;"
                    x-transition:enter="transition ease-out duration-100"
                    x-transition:enter-start="opacity-0 scale-95"
                    x-transition:enter-end="opacity-100 scale-100"
                    x-transition:leave="transition ease-in duration-75"
                    x-transition:leave-start="opacity-100 scale-100"
                    x-transition:leave-end="opacity-0 scale-95"
                    class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-slate-200 z-50 py-1">
                    <div class="px-4 py-2 border-b border-slate-100">
                        <p class="text-sm font-semibold text-slate-800 truncate">{{ request.user.get_full_name|default:request.user.username }}</p>
                        <p class="text-xs text-slate-500 truncate">{{ request.user.email }}</p>
                    </div>
                    <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button type="submit"
                            class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
                            </svg>
                            登出
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</header>
