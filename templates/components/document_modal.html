<!-- Document Generation Modal Component -->
<div x-data="documentModal()" x-show="isOpen" @open-document-modal.window="openModal($event.detail)"
    class="fixed inset-0 z-50 overflow-y-auto" style="display: none;" x-cloak>

    <!-- Backdrop -->
    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm transition-opacity" x-show="isOpen"
        x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100" x-transition:leave="ease-in duration-200"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" @click="closeModal()"></div>

    <!-- Modal Panel -->
    <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
        <div class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg"
            x-show="isOpen" x-transition:enter="ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
            x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" x-transition:leave="ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
            x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95">

            <form method="post" :action="generateUrl" @submit.prevent="submitForm">
                {% csrf_token %}
                <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
                    <div class="sm:flex sm:items-start">
                        <div
                            class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-indigo-100 sm:mx-0 sm:h-10 sm:w-10">
                            <svg class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                            </svg>
                        </div>
                        <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left w-full">
                            <h3 class="text-base font-semibold leading-6 text-slate-900" id="modal-title">產生文件</h3>
                            <div class="mt-2">
                                <p class="text-sm text-slate-500 mb-4">請選擇要使用的文件模板：</p>

                                <!-- Loading State -->
                                <div x-show="loading" class="flex justify-center py-4">
                                    <svg class="animate-spin h-5 w-5 text-indigo-600" xmlns="http://www.w3.org/2000/svg"
                                        fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                            stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor"
                                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                        </path>
                                    </svg>
                                </div>

                                <!-- Template Selection -->
                                <div x-show="!loading">
                                    <template x-if="templates.length > 0">
                                        <div class="space-y-2">
                                            <template x-for="template in templates" :key="template.id">
                                                <div class="flex items-center p-2 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer"
                                                    :class="selectedTemplate === template.id ? 'border-indigo-500 ring-1 ring-indigo-500 bg-indigo-50' : ''"
                                                    @click="selectedTemplate = template.id">
                                                    <input type="radio" :name="'template'" :value="template.id"
                                                        x-model="selectedTemplate"
                                                        class="h-4 w-4 text-indigo-600 border-slate-300 focus:ring-indigo-600">
                                                    <div class="ml-3">
                                                        <label class="block text-sm font-medium text-slate-900"
                                                            x-text="template.name"></label>
                                                        <p class="text-xs text-slate-500" x-text="template.description">
                                                        </p>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template x-if="templates.length === 0">
                                        <div class="text-center py-4 text-slate-500 text-sm">
                                            沒有可用的模板。
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-slate-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
                    <button type="submit"
                        class="inline-flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 sm:ml-3 sm:w-auto disabled:opacity-50 disabled:cursor-not-allowed"
                        :disabled="!selectedTemplate || loading">
                        確認產生
                    </button>
                    <button type="button"
                        class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50 sm:mt-0 sm:w-auto"
                        @click="closeModal()">
                        取消
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function documentModal() {
        return {
            isOpen: false,
            loading: false,
            appLabel: '',
            modelName: '',
            objectId: null,
            generateUrl: '',
            templates: [],
            selectedTemplate: null,

            openModal(detail) {
                this.appLabel = detail.appLabel;
                this.modelName = detail.modelName;
                this.objectId = detail.objectId;
                this.isOpen = true;
                this.selectedTemplate = null;
                this.fetchTemplates();
            },

            closeModal() {
                this.isOpen = false;
                this.templates = [];
                this.selectedTemplate = null;
            },

            async fetchTemplates() {
                this.loading = true;
                try {
                    const response = await fetch(`/core/documents/templates/${this.appLabel}/${this.modelName}/`);
                    const data = await response.json();
                    this.templates = data.templates;
                    if (this.templates.length > 0) {
                        this.selectedTemplate = this.templates[0].id;
                    }
                } catch (error) {
                    console.error('Error fetching templates:', error);
                    alert('無法載入模板資料');
                } finally {
                    this.loading = false;
                }
            },

            submitForm(e) {
                // Construct URL dynamically based on selection
                if (!this.selectedTemplate) return;

                // Form action URL structure: /documents/generate/<template_id>/<app_label>/<model_name>/<object_id>/
                this.generateUrl = `/core/documents/generate/${this.selectedTemplate}/${this.appLabel}/${this.modelName}/${this.objectId}/`;

                // We can't change form action dynamically after submit started easily without preventing default usually,
                // but we did prevent default.
                // However, we can just trigger a download directly or submit the form to the new URL.

                const form = e.target;
                form.action = this.generateUrl;
                form.submit();

                this.closeModal();
            }
        }
    }
</script>
