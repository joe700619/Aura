<div x-data="{
    rows: [],
    init() {
        // Initialize rows from hidden input if data exists
        const initialData = JSON.parse(document.getElementById('id_quotation_data').value || '[]');
        if (initialData.length > 0) {
            this.rows = initialData;
        } else {
            this.addRow(); // Add default empty row
        }
        
        // Watch for changes and update hidden input
        this.$watch('rows', (value) => {
            document.getElementById('id_quotation_data').value = JSON.stringify(value);
            // Dispatch event for cost sharing component
             window.dispatchEvent(new CustomEvent('service-fee-changed', {
                detail: { total: this.calculateServiceFee() }
            }));
        });
        
        // Listen for requests from cost sharing table
        window.addEventListener('request-service-fee', () => {
             console.log('Received request for service fee total');
             window.dispatchEvent(new CustomEvent('service-fee-changed', {
                detail: { total: this.calculateServiceFee() }
            }));
        });
    },
    addRow() {
        this.rows.push({
            service_code: '',
            service_name: '',
            amount: 0,
            remark: '',
            is_company_law_22_1: false,
            is_money_laundering_check: false,
            is_business_entity_change: false,
            is_shareholder_list_change: false
        });
    },
    removeRow(index) {
        this.rows.splice(index, 1);
        if (this.rows.length === 0) {
            this.addRow();
        }
    },
    calculateTotal() {
        return this.rows.reduce((sum, row) => sum + (parseInt(row.amount) || 0), 0);
    },
    calculateServiceFee() {
        return this.rows.reduce((sum, row) => {
            const name = (row.service_name || '').trim();
            if (!name.startsWith('8') && !name.startsWith('9')) {
                return sum + (parseInt(row.amount) || 0);
            }
            return sum;
        }, 0);
    },
    calculateAdvancePayment() {
        return this.rows.reduce((sum, row) => {
            const name = (row.service_name || '').trim();
            if (name.startsWith('9')) {
                return sum + (parseInt(row.amount) || 0);
            }
            return sum;
        }, 0);
    },
    calculatePreCollection() {
        return this.rows.reduce((sum, row) => {
            const name = (row.service_name || '').trim();
            if (name.startsWith('8')) {
                return sum + (parseInt(row.amount) || 0);
            }
            return sum;
        }, 0);
    },
    calculateUncollected() {
        return this.calculateServiceFee() + this.calculateAdvancePayment() + this.calculatePreCollection();
    },
    // Function to handle selection from modal (to be integrated)
    updateRow(index, data) {
        this.rows[index].service_code = data.department || ''; // Mapping department codes if available
        this.rows[index].service_name = data.name;
        this.rows[index].amount = data.reference_fee || 0;
        this.rows[index].remark = data.remark || '';
        this.rows[index].is_company_law_22_1 = data.is_company_law_22_1 || false;
        this.rows[index].is_money_laundering_check = data.is_money_laundering_check || false;
        this.rows[index].is_business_entity_change = data.is_business_entity_change || false;
        this.rows[index].is_shareholder_list_change = data.is_shareholder_list_change || false;
    }
}" class="space-y-4">
    <!-- Actions -->
    <div>
        <button type="button" @click="addRow()"
            class="inline-flex items-center px-3 py-2 border border-slate-300 shadow-sm text-sm leading-4 font-medium rounded-md text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            <svg class="h-4 w-4 mr-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                    d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z"
                    clip-rule="evenodd" />
            </svg>
            新增細項
        </button>
    </div>
    <!-- Table -->
    <div class="overflow-x-auto border border-slate-200 rounded-lg">
        <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50">
                <tr>
                    <th scope="col"
                        class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider w-1/12">
                        操作</th>
                    <th scope="col"
                        class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider w-3/12">
                        服務項目</th>
                    <th scope="col"
                        class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider w-2/12">
                        金額</th>
                    <th scope="col"
                        class="px-4 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider w-4/12">
                        備註</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-slate-200">
                <template x-for="(row, index) in rows" :key="index">
                    <tr>
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-slate-500 align-top">
                            <button type="button" @click="removeRow(index)" class="text-red-500 hover:text-red-700">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                                    </path>
                                </svg>
                            </button>
                        </td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-slate-900 align-top">
                            <!-- Service Item Search & Input -->
                            <div class="space-y-2">
                                <div class="relative">
                                    <!-- Search Trigger (simulated for now, real implementation needs a modal) -->
                                    <!-- Creating a dedicated scoped search component could be complex inside a loop. 
                                          Simplest approach: Input with a search button that opens a modal, passing the row index. -->
                                    <input type="text" x-model="row.service_name"
                                        class="block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                                        placeholder="輸入或搜尋服務項目">
                                    <button type="button" @click="$dispatch('open-service-modal', { index: index })"
                                        class="absolute inset-y-0 right-0 flex items-center px-2 text-slate-400 hover:text-blue-500">
                                        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                                            fill="currentColor">
                                            <path fill-rule="evenodd"
                                                d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                                                clip-rule="evenodd" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-slate-900 align-top">
                            <input type="number" x-model="row.amount"
                                class="block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm text-right">
                        </td>
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-slate-900 align-top">
                            <input type="text" x-model="row.remark"
                                class="block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                        </td>
                    </tr>
                </template>
            </tbody>
            <tfoot class="bg-slate-50 font-bold">
                <tr>
                    <td colspan="2" class="px-4 py-3 text-right text-sm text-slate-700">服務費用合計 (+) :</td>
                    <td class="px-4 py-3 text-right text-sm text-slate-900">
                        <span x-text="calculateServiceFee().toLocaleString()"></span>
                    </td>
                    <td></td>
                </tr>
                <tr>
                    <td colspan="2" class="px-4 py-3 text-right text-sm text-slate-700">代墊款合計 (+) :</td>
                    <td class="px-4 py-3 text-right text-sm text-slate-900">
                        <span x-text="calculateAdvancePayment().toLocaleString()"></span>
                    </td>
                    <td></td>
                </tr>
                <tr>
                    <td colspan="2" class="px-4 py-3 text-right text-sm text-slate-700">預收款合計 (-) :</td>
                    <td class="px-4 py-3 text-right text-sm text-red-600">
                        <span x-text="calculatePreCollection().toLocaleString()"></span>
                    </td>
                    <td></td>
                </tr>
                <tr class="bg-slate-100 border-t-2 border-slate-300">
                    <td colspan="2" class="px-4 py-3 text-right text-base font-bold text-slate-900">未收款合計 (=) :</td>
                    <td class="px-4 py-3 text-right text-base font-bold text-blue-600">
                        <span x-text="calculateUncollected().toLocaleString()"></span>
                    </td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>



    <!-- Service Item Search Modal (Global for this component) -->
    <template x-teleport="body">
        <div x-data="{ 
                isOpen: false, 
                searchQuery: '', 
                targetRowIndex: null,
                searchResults: [],
                isSearching: false,
                
                openModal(event) {
                    this.targetRowIndex = event.detail.index;
                    this.isOpen = true;
                    this.$nextTick(() => $refs.searchInput.focus());
                    this.search(); // Load initial data
                },
                
                async search() {
                    this.isSearching = true;
                    const response = await fetch(`/basic-data/api/service-items/search/?q=${this.searchQuery}`, {
                       headers: { 'X-Requested-With': 'XMLHttpRequest' }
                    });
                    const html = await response.text();
                    this.searchResults = html; 
                    this.isSearching = false;
                },
                
                selectItem(data) {
                    this.$dispatch('update-row', { index: this.targetRowIndex, data: data });
                    this.isOpen = false;
                }
            }" @open-service-modal.window="openModal($event)" 
               @service-item-selected.stop="selectItem($event.detail)"
               x-show="isOpen" style="display: none;"
            class="fixed inset-0 z-[100] flex items-center justify-center p-4">

            <!-- Backdrop -->
            <div x-show="isOpen" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0"
                x-transition:enter-end="opacity-100" x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
                class="fixed inset-0 bg-slate-900/60 transition-opacity" aria-hidden="true"
                @click="isOpen = false"></div>

            <div x-show="isOpen" x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                class="bg-white rounded-lg overflow-hidden shadow-xl transform transition-all sm:max-w-xl w-full max-h-[80vh] flex flex-col relative z-[101]">
                
                <div class="px-4 py-3 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                    <h3 class="text-lg leading-6 font-medium text-gray-900" id="modal-title">搜尋服務項目</h3>
                    <button @click="isOpen = false" class="text-gray-400 hover:text-gray-500">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <div class="p-4 flex-1 flex flex-col overflow-hidden">
                    <div class="relative mb-4">
                        <input type="text" x-model="searchQuery" @input.debounce.500ms="search()" x-ref="searchInput"
                            class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm pl-10"
                            placeholder="輸入名稱搜尋...">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                    </div>

                    <div class="flex-1 overflow-y-auto pr-1">
                        <div x-show="isSearching" class="py-10 text-center">
                            <svg class="animate-spin h-8 w-8 text-blue-500 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <p class="mt-2 text-sm text-gray-500">搜尋中...</p>
                        </div>
                        <div id="service_item_search_results" x-show="!isSearching" x-html="searchResults"></div>
                    </div>
                </div>

                <div class="bg-gray-50 px-4 py-3 sm:px-6 flex justify-end">
                    <button type="button" @click="isOpen = false"
                        class="inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:text-sm">關閉</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Listener to update specific row from modal selection -->
    <div @update-row.window="updateRow($event.detail.index, $event.detail.data)"></div>
</div>
