<!-- Voucher Preview Modal Component -->
<div x-data="{
    isOpen: false,
    entries: [],
    hasOutstandingBalance: false,
    errorMessage: '',
    
    openModal() {
        this.generateEntries();
        this.isOpen = true;
    },
    
    generateEntries() {
        this.entries = [];
        this.hasOutstandingBalance = false;
        this.errorMessage = '';
        
        let mode = 'receivable'; // default
        const modeScript = document.getElementById('voucher_generation_mode');
        if (modeScript) {
            try {
                mode = JSON.parse(modeScript.textContent);
            } catch(e){}
        }

        /* Get VAT Number */
        let companyVat = '';
        const vatInput = document.getElementById('receivable_unified_business_no');
        if (vatInput) {
            try {
                companyVat = JSON.parse(vatInput.textContent).toString().trim();
            } catch (e) {}
        }
        
        if (mode === 'receivable') {
            this.generateReceivableEntries(companyVat);
        } else if (mode === 'progress') {
            this.generateProgressEntries(companyVat);
        } else if (mode === 'billing') {
            this.generateBillingEntries(companyVat);
        } else if (mode === 'advance_payment') {
            this.generateAdvancePaymentEntries();
        }
    },
    
    generateProgressEntries(companyVat) {
        const quotationInput = document.getElementById('id_quotation_data');
        if (!quotationInput) {
            this.errorMessage = '找不到報價單資料，無法產生分錄。';
            return;
        }
        
        try {
            const quotationData = JSON.parse(quotationInput.value || '[]');
            if (quotationData.length === 0) {
                this.errorMessage = '報價單無項目，不可產生傳票分錄。';
                return;
            }
            
            quotationData.forEach(item => {
                const serviceName = (item.service_name || '').trim();
                let amount = parseFloat(item.amount) || 0;
                const remark = (item.remark || '').trim();
                
                if (serviceName.startsWith('8')) {
                    amount = Math.abs(amount);
                }
                
                if (!serviceName || amount <= 0) return;
                
                if (serviceName.startsWith('1')) {
                    this.addGeneratedEntry('credit', '400001', '簽證收入', amount, remark, companyVat);
                } else if (serviceName.startsWith('2')) {
                    this.addGeneratedEntry('credit', '400002', '記帳收入', amount, remark, companyVat);
                } else if (serviceName.startsWith('3')) {
                    this.addGeneratedEntry('credit', '400003', '登記收入', amount, remark, companyVat);
                } else if (serviceName.startsWith('9')) {
                    this.addGeneratedEntry('credit', '1140', '預付款項', amount, remark, companyVat);
                } else if (serviceName.startsWith('8')) {
                    this.addGeneratedEntry('debit', '2190', '預收款項', amount, remark, companyVat);
                }
            });
            
            /* Calculate Uncollected */
            const totalDebits = this.entries.reduce((sum, e) => sum + (e.debit_amount || 0), 0);
            const totalCredits = this.entries.reduce((sum, e) => sum + (e.credit_amount || 0), 0);
            const diff = totalCredits - totalDebits;
            
            if (diff > 0) {
                this.addGeneratedEntry('debit', '1123', '應收帳款', diff, '未收款合計', companyVat);
            } else if (diff < 0) {
                this.addGeneratedEntry('credit', '1123', '應收帳款', Math.abs(diff), '未收款合計 (溢收)', companyVat);
            }
            
            if (this.entries.length === 0) {
                this.addEntry();
            }
        } catch (e) {
            console.error('Failed to parse quotation data', e);
            this.errorMessage = '解析報價單資料發生錯誤。';
        }
    },
    
    generateBillingEntries(companyVat) {
        const quotationInput = document.getElementById('id_quotation_data');
        const advanceInput = document.getElementById('id_advance_payment_data');
        const costSharingInput = document.getElementById('id_cost_sharing_data');
        
        let serviceFeeTotal = 0;
        let advancePaymentTotal = 0;
        let costSharingTotal = 0;
        
        try {
            /* Parse Service Fees */
            if (quotationInput) {
                const quotationData = JSON.parse(quotationInput.value || '[]');
                quotationData.forEach(item => {
                    const amount = parseFloat(item.amount) || 0;
                    const serviceName = (item.service_name || '').trim();
                    if (amount > 0 && !serviceName.startsWith('8') && !serviceName.startsWith('9')) {
                         serviceFeeTotal += amount;
                    }
                });
            }
            
            /* Parse Advance Payments — group by payment_type → account code */
            const advanceTypeMap = {
                '郵資及快遞': { code: '613202', name: '郵資及快遞' },
                '統購發票':   { code: '613203', name: '發票費用' },
                '零買發票':   { code: '613203', name: '發票費用' },
                '稅款':       { code: '1141',   name: '代墊稅款及保費' },
                '補充保費':   { code: '1141',   name: '代墊稅款及保費' },
                '政府規費':   { code: '1142',   name: '代墊政府規費' },
                '印章':       { code: '613204', name: '印章費用' },
            };
            const defaultAdvanceAccount = { code: '6132', name: '代墊費用' };

            /* accumulators: { accountCode: { name, total } } */
            const advanceByCode = {};
            if (advanceInput) {
                const advanceData = JSON.parse(advanceInput.value || '[]');
                advanceData.forEach(item => {
                    const amount = parseFloat(item.amount) || 0;
                    if (amount <= 0) return;
                    advancePaymentTotal += amount;
                    const payType = (item.payment_type || '').trim();
                    const acct = advanceTypeMap[payType] || defaultAdvanceAccount;
                    if (!advanceByCode[acct.code]) {
                        advanceByCode[acct.code] = { name: acct.name, total: 0 };
                    }
                    advanceByCode[acct.code].total += amount;
                });
            }

            /* Cross-check Cost Sharing vs Service Fee */
            if (costSharingInput) {
                const costSharingData = JSON.parse(costSharingInput.value || '[]');
                costSharingData.forEach(item => {
                    const amount = parseFloat(item.amount) || 0;
                    if (amount > 0) costSharingTotal += amount;
                });

                if (costSharingTotal > 0 && Math.abs(costSharingTotal - serviceFeeTotal) > 0.1) {
                    this.errorMessage = `公費分攤合計 (${costSharingTotal}) 與服務費用合計 (${serviceFeeTotal}) 不符，無法產生分錄。`;
                    return;
                }
            }

            if (serviceFeeTotal === 0 && advancePaymentTotal === 0) {
                this.errorMessage = '帳單無任何費用，無法產生傳票。';
                return;
            }

            /* Generate Entries */
            if (serviceFeeTotal > 0) {
                this.addGeneratedEntry('credit', '400002', '記帳收入', serviceFeeTotal, '服務費用合計', companyVat);
            }

            /* One credit entry per advance payment account code (grouped & summed) */
            Object.entries(advanceByCode).forEach(([code, info]) => {
                this.addGeneratedEntry('credit', code, info.name, info.total, '代墊款合計', companyVat);
            });

            const uncollectedTotal = serviceFeeTotal + advancePaymentTotal;
            if (uncollectedTotal > 0) {
                this.addGeneratedEntry('debit', '1123', '應收帳款', uncollectedTotal, '未收款合計', companyVat);
            }
            
            if (this.entries.length === 0) {
                this.addEntry();
            }
        } catch (e) {
            console.error('Failed to parse billing data', e);
            this.errorMessage = '解析帳單資料發生錯誤。';
        }
    },
    
    generateReceivableEntries(companyVat) {
        /* Step 1: Check outstanding balance */
        const balanceInput = document.getElementById('receivable_outstanding_balance');
        if (balanceInput) {
            try {
                /* Parse balance and remove any potential formatting commas */
                const balStr = JSON.parse(balanceInput.textContent).toString().replace(/,/g, '');
                const balance = parseFloat(balStr) || 0;
                if (balance > 0) {
                    this.hasOutstandingBalance = true;
                    this.errorMessage = '尚有未收款項，無法過帳';
                    return; /* Stop generating entries */
                }
            } catch (e) {
                console.error('Failed to parse outstanding balance', e);
            }
        }

        /* Step 2: Generate Collection entries */
        const collectionsInput = document.getElementById('receivable_collections_data');
        if (collectionsInput) {
            try {
                const collections = JSON.parse(collectionsInput.textContent);
                collections.forEach(col => {
                    const amount = parseFloat(col.amount) || 0;
                    const tax = parseFloat(col.tax) || 0;
                    const fee = parseFloat(col.fee) || 0;
                    const allowance = parseFloat(col.allowance) || 0;
                    const total = parseFloat(col.total) || 0;
                    
                    if (col.is_posted) {
                        /* 1. 已過帳: 借 2190 預收款項 (金額為合計) */
                        if (total > 0) {
                            this.addGeneratedEntry('debit', '2190', '預收款項', total, '預收款沖轉', companyVat);
                        }
                    } else {
                        /* 2. 未過帳: 依據方式 */
                        let methodCode = '111401';
                        let methodName = '銀行存款';
                        if (col.method === 'bank') {
                            methodCode = '111401';
                            methodName = '國泰世華';
                        } else if (col.method === 'ecpay') {
                            methodCode = '111403';
                            methodName = '綠界';
                        } else if (col.method === 'cash') {
                            methodCode = '1110';
                            methodName = '現金';
                        } else if (col.method === 'notes') {
                            methodCode = '1124';
                            methodName = '應收票據';
                        }
                        
                        if (amount > 0) {
                            this.addGeneratedEntry('debit', methodCode, methodName, amount, '收款', companyVat);
                        }
                        
                        /* 3. 填入其他費用部分 */
                        if (tax > 0) {
                            this.addGeneratedEntry('debit', '1149', '扣繳稅款', tax, '扣繳稅款', companyVat);
                        }
                        if (fee > 0) {
                            this.addGeneratedEntry('debit', '613201', '手續費', fee, '手續費', companyVat);
                        }
                        if (allowance > 0) {
                            this.addGeneratedEntry('debit', '6123', '呆帳損失', allowance, '折讓', companyVat);
                        }
                    }
                });
            } catch (e) {
                console.error('Failed to parse collections data', e);
            }
        }
        
        /* Step 3: 計算貸方科目 1123 應收帳款 */
        /* 貸方金額為借方總和 (確保過帳前天生平衡) */
        const totalDebits = this.entries.reduce((sum, e) => sum + (parseFloat(e.debit_amount) || 0), 0);
        if (totalDebits > 0) {
            this.addGeneratedEntry('credit', '1123', '應收帳款', totalDebits, '應收帳款沖帳', companyVat);
        }
        
        /* Ensure at least one empty row if no data generated and no outstanding balance error */
        if (this.entries.length === 0 && !this.hasOutstandingBalance) {
            this.addEntry();
        }
    },
    
    generateAdvancePaymentEntries() {
        const tbody = document.querySelector('#details-table tbody');
        if (!tbody) {
            this.errorMessage = '找不到明細資料，請確認明細表已正確載入。';
            return;
        }

        const paymentTypeMap = {
            'POSTAGE':               { code: '613202', name: '郵資及快遞' },
            'GROUP_INVOICE':         { code: '613203', name: '發票費用' },
            'TAX':                   { code: '1141',   name: '代墊稅款及保費' },
            'SUPPLEMENTARY_PREMIUM': { code: '1141',   name: '代墊稅款及保費' },
            'GOV_FEE':               { code: '1142',   name: '代墊政府規費' },
            'RETAIL_INVOICE':        { code: '613203', name: '發票費用' },
            'SEAL':                  { code: '613204', name: '印章費用' },
        };

        let total = 0;
        tbody.querySelectorAll('tr.detail-row').forEach(row => {
            const deleteCheckbox = row.querySelector('.delete-wrapper input');
            if (deleteCheckbox && deleteCheckbox.checked) return;

            const amountInput = row.querySelector('.amount-input');
            const amount = parseFloat(amountInput ? amountInput.value : 0) || 0;
            if (amount <= 0) return;

            const ubnInput = row.querySelector('.ubn-input');
            const ubn = ubnInput ? ubnInput.value.trim() : '';

            const reasonInput = row.querySelector('.reason-input');
            const reason = reasonInput ? reasonInput.value.trim() : '';

            const paymentTypeSelect = row.querySelector('.payment-type-select');
            const paymentType = paymentTypeSelect ? paymentTypeSelect.value : '';
            const account = paymentTypeMap[paymentType] || { code: '6132', name: '代墊費用' };

            this.addGeneratedEntry('debit', account.code, account.name, amount, reason, ubn);
            total += amount;
        });

        if (total <= 0) {
            this.errorMessage = '明細金額合計為 0，無法產生傳票。';
            return;
        }

        this.addGeneratedEntry('credit', '111401', '國泰世華', total, '代墊款合計', '');
    },

    addGeneratedEntry(type, code, name, amount, remark, company_id = '') {
        this.entries.push({
            account_code: code,
            account: name,
            debit_amount: type === 'debit' ? amount : '',
            credit_amount: type === 'credit' ? amount : '',
            company_id: company_id,
            remark: remark
        });
    },
    
    addEntry() {
        this.entries.push({
            account_code: '',
            account: '',
            debit_amount: '',
            credit_amount: '',
            company_id: '',
            remark: ''
        });
    },
    
    removeEntry(index) {
        this.entries.splice(index, 1);
        if (this.entries.length === 0) {
            this.addEntry();
        }
    },
    
    get totalDebits() {
        return this.entries.reduce((sum, e) => sum + (parseFloat(e.debit_amount) || 0), 0);
    },
    
    get totalCredits() {
        return this.entries.reduce((sum, e) => sum + (parseFloat(e.credit_amount) || 0), 0);
    },
    
    get isBalanced() {
        const debits = this.totalDebits;
        const credits = this.totalCredits;
        return debits === credits && debits > 0;
    },
    
    get balanceDiff() {
        return Math.abs(this.totalDebits - this.totalCredits);
    },
    
    confirmPost() {
        if (!this.isBalanced) {
            alert('借貸金額不平，請修正後再過帳！');
            return;
        }

        const postedCheckbox = document.querySelector('input[name=\'is_posted\'][type=\'checkbox\']');
        if (postedCheckbox) {
            postedCheckbox.checked = true;
            console.log('Voucher Modal: Checked is_posted checkbox');
        } else {
            console.error('Voucher Modal: Could not find is_posted checkbox!');
            alert('找不到過帳勾選框，可能遭到隱藏或移除，請聯絡系統管理員。');
            return;
        }
        
        this.isOpen = false;
        
        /* Auto submit the form */
        /* Using explicit ID and fallback to ensure we don't grab the logout form in topbar */
        let form = document.getElementById('main-form');
        if (!form) {
             const anyField = document.querySelector('input[name=\'receivable_no\']');
             if (anyField && anyField.form) form = anyField.form;
        }

        if (form) {
            console.log('Voucher Modal: Submitting form', form.id);
            /* Trigger Alpine loading state if possible */
            if (typeof window.Alpine !== 'undefined') {
                const root = document.querySelector('[x-data]');
                if (root && root.__x) {
                    const data = Alpine.$data(root);
                    if (data && 'globalSubmitting' in data) {
                        data.globalSubmitting = true;
                    }
                }
            }
            /* Delay slightly to ensure UI updates and checkbox state is propagated */
            setTimeout(() => {
                HTMLFormElement.prototype.submit.call(form);
            }, 100);
        } else {
            console.error('Voucher Modal: Main form not found!');
            alert('已勾選「已核對過帳」，但找不到主表單自動送出，請手動按「儲存」送出表單。');
        }
    }
}"

                                    </svg>
                                    增加一列
                                </button>
                            </div>
                            
                            <!-- Voucher Table -->
                            <div class="overflow-x-auto border border-slate-200 rounded-lg">
                                <table class="min-w-full divide-y divide-slate-200">
                                    <thead class="bg-slate-50">
                                        <tr>
                                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider w-8">操作</th>

                                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider w-32">會計科目</th>
                                            <th scope="col" class="px-3 py-3 text-right text-xs font-medium text-slate-500 uppercase tracking-wider w-28">借方金額</th>
                                            <th scope="col" class="px-3 py-3 text-right text-xs font-medium text-slate-500 uppercase tracking-wider w-28">貸方金額</th>
                                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider w-28">對象(統編)</th>
                                            <th scope="col" class="px-3 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">備註/摘要</th>
                                        </tr>
                                    </thead>
                                    <tbody class="bg-white divide-y divide-slate-200">
                                        <template x-for="(entry, index) in entries" :key="index">
                                            <tr>
                                                <td class="px-3 py-2 whitespace-nowrap text-sm text-slate-500 text-center">
                                                    <button type="button" @click="removeEntry(index)" class="text-red-500 hover:text-red-700">
                                                        <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                                        </svg>
                                                    </button>
                                                </td>
                                                <td class="px-3 py-2 whitespace-nowrap text-sm text-slate-900">
                                                    <input type="text" x-model="entry.account_code" class="block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="代碼">
                                                </td>
                                                <td class="px-3 py-2 whitespace-nowrap text-sm text-slate-900">
                                                    <input type="text" x-model="entry.account" class="block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="科目名稱">
                                                </td>
                                                <td class="px-3 py-2 whitespace-nowrap text-sm text-slate-900">
                                                    <input type="number" x-model.number="entry.debit_amount" class="block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm text-right" placeholder="0">
                                                </td>
                                                <td class="px-3 py-2 whitespace-nowrap text-sm text-slate-900">
                                                    <input type="number" x-model.number="entry.credit_amount" class="block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm text-right" placeholder="0">
                                                </td>
                                                <td class="px-3 py-2 whitespace-nowrap text-sm text-slate-900">
                                                    <input type="text" x-model="entry.company_id" class="block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="統一編號">
                                                </td>
                                                <td class="px-3 py-2 text-sm text-slate-900 min-w-[16rem]">
                                                    <textarea x-model="entry.remark" rows="2" class="block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm resize-none" placeholder="備註/摘要"></textarea>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                    <tfoot class="bg-blue-50/50 border-t border-slate-200">
                                        <tr class="font-bold text-slate-700">
                                            <td colspan="3" class="px-4 py-3 text-right text-sm">合計：</td>
                                            <td class="px-4 py-3 text-right text-sm font-mono text-blue-700" x-text="totalDebits.toLocaleString()"></td>
                                            <td class="px-4 py-3 text-right text-sm font-mono text-blue-700" x-text="totalCredits.toLocaleString()"></td>
                                            <td colspan="2"></td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="bg-gray-50 px-4 py-3 sm:px-6 flex flex-row-reverse border-t border-gray-200">
                <button type="button" @click="confirmPost()"
                    :disabled="hasOutstandingBalance || !isBalanced || !!errorMessage || entries.length === 0"
                    :class="(hasOutstandingBalance || !isBalanced || !!errorMessage || entries.length === 0) ? 'bg-gray-300 text-gray-500 cursor-not-allowed border-gray-300' : 'bg-blue-600 text-white hover:bg-blue-700 border-transparent'"
                    class="ml-3 inline-flex justify-center rounded-md border shadow-sm px-4 py-2 text-base font-medium focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:w-auto sm:text-sm transition-colors duration-200">
                    確定並過帳
                </button>
                <button type="button" @click="isOpen = false"
                    class="ml-3 inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:w-auto sm:text-sm transition-colors duration-200">
                    取消
                </button>
            </div>
            
        </div>
    </div>
</div>
