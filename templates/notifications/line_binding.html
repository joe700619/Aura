<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳號綁定系統</title>
    <!-- Tailwind CSS (CDN for simple decoupled page) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-xl shadow-lg w-full max-w-sm p-6">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">登入與綁定</h1>
            <p class="text-gray-500 text-sm mt-1">請輸入您公司的統一編號</p>
        </div>

        <div id="loadingApp" class="text-center py-4">
            <p class="text-gray-500">正在載入 Line 驗證...</p>
        </div>

        <div id="bindingFormContainer" class="hidden">
            <form id="bindingForm" class="space-y-4">
                {% csrf_token %}
                <input type="hidden" id="line_user_id" name="line_user_id" value="">
                
                <div>
                    <label for="tax_id" class="block text-sm font-medium text-gray-700">統一編號</label>
                    <input type="text" id="tax_id" name="tax_id" required pattern="[0-9]{8}"
                        class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        placeholder="請輸入 8 位數統一編號">
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition">
                    確定綁定
                </button>
            </form>
        </div>

        <div id="successMessage" class="hidden text-center py-6">
            <div class="mb-4 text-green-500">
                <svg class="mx-auto h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-gray-800">綁定成功</h2>
            <p class="text-gray-500 mt-2">您現在可以關閉此視窗了</p>
            <button onclick="liff.closeWindow()" class="mt-6 w-full py-2 bg-gray-200 text-gray-800 rounded-lg font-medium hover:bg-gray-300 transition">關閉視窗</button>
        </div>

        <div id="errorMessage" class="hidden text-center py-4 mt-4 bg-red-50 text-red-600 rounded-lg text-sm border border-red-200">
        </div>
    </div>

    <!-- LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const LIFF_ID = "{{ liff_id }}";

        document.addEventListener("DOMContentLoaded", () => {
             if(!LIFF_ID) {
                  showError("系統未設定 LIFF ID，請聯絡管理員");
                  return;
             }

            // 初始化 LIFF
            liff.init({ liffId: LIFF_ID })
                .then(() => {
                    if (!liff.isLoggedIn()) {
                        liff.login();
                        return;
                    }
                    // 已登入，取得 User Profile
                    liff.getProfile()
                        .then(profile => {
                            const userId = profile.userId;
                            document.getElementById('line_user_id').value = userId;
                            
                            // 顯示表單
                            document.getElementById('loadingApp').classList.add('hidden');
                            document.getElementById('bindingFormContainer').classList.remove('hidden');
                        })
                        .catch(err => {
                            showError('無法取得 Line 個人資料: ' + err);
                        });
                })
                .catch(err => {
                    showError('LIFF 初始化失敗: ' + err);
                });
        });

        // 提交表單
        document.getElementById('bindingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const taxId = document.getElementById('tax_id').value;
            const lineUserId = document.getElementById('line_user_id').value;
            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

            if(!taxId || !lineUserId) return;

            btn.disabled = true;
            btn.innerHTML = '綁定中...';
            document.getElementById('errorMessage').classList.add('hidden');

            fetch("{% url 'line_binding_submit' %}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({
                    tax_id: taxId,
                    line_user_id: lineUserId
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('bindingFormContainer').classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                } else {
                    showError(data.error || '綁定失敗，請確認統編是否正確');
                    btn.disabled = false;
                    btn.innerHTML = '確定綁定';
                }
            })
            .catch(err => {
                showError('系統錯誤，請稍後再試');
                btn.disabled = false;
                btn.innerHTML = '確定綁定';
            });
        });

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.classList.remove('hidden');
            document.getElementById('loadingApp').classList.add('hidden');
        }
    </script>
</body>
</html>
