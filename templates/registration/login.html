{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 | Aura ERP</title>
    {% tailwind_css %}
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-slate-800">Aura ERP</h1>
                <p class="text-slate-500 mt-1 text-sm">請輸入帳號密碼登入</p>
            </div>

            {% if form.errors %}
            <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-4">
                帳號或密碼不正確，請重新輸入。
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-700 mb-1" for="id_username">帳號</label>
                    <input id="id_username" name="username" type="text" autofocus autocomplete="username"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
                        value="{{ form.username.value|default:'' }}">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 mb-1" for="id_password">密碼</label>
                    <input id="id_password" name="password" type="password" autocomplete="current-password"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
                </div>

                <button type="submit"
                    class="w-full bg-slate-800 hover:bg-slate-700 text-white font-medium py-2 rounded-lg text-sm transition-colors">
                    登入
                </button>
            </form>
        </div>
    </div>
</body>
</html>
