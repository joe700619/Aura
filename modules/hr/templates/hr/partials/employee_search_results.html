{% for employee in employees %}
<div class="cursor-pointer hover:bg-blue-50 p-2 border-b border-gray-100 last:border-0" @click="selectItem({
         id: '{{ employee.company_id }}',
         name: '{{ employee.name|escapejs }}',
         department: '{{ employee.department|default:''|escapejs }}'
     })">
    <div class="flex justify-between items-center">
        <div>
            <div class="text-sm font-medium text-gray-900">{{ employee.name }}</div>
            <div class="text-xs text-gray-500">{{ employee.employee_number }}</div>
        </div>
        <div class="text-xs text-gray-400">
            {{ employee.department|default:"-" }}
        </div>
    </div>
</div>
{% empty %}
<div class="p-4 text-center text-sm text-gray-500">
    沒有找到符合的員工
</div>
{% endfor %}
