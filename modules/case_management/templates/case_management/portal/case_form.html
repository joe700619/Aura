{% extends "client_portal/portal_base.html" %}
{% block page_title %}發起新案件{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">

  <div class="bg-white rounded-lg shadow p-5 mb-4">
    <div class="flex items-start gap-3">
      <div class="text-3xl">📩</div>
      <div>
        <h1 class="text-xl font-bold text-gray-800">發起新案件</h1>
        <p class="text-sm text-gray-500 mt-1">請告訴我們您需要協助的事項，您的負責會計師將會收到通知並儘快回覆。</p>
      </div>
    </div>
  </div>

  <form method="post" class="bg-white rounded-lg shadow p-6 space-y-5">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          {{ field.label }}{% if field.field.required %} <span class="text-red-500">*</span>{% endif %}
        </label>
        {{ field }}
        {% if field.errors %}<div class="text-xs text-red-500 mt-1">{{ field.errors }}</div>{% endif %}
      </div>
    {% endfor %}
    <div class="flex justify-between pt-4 border-t">
      <a href="{% url 'case_portal:list' %}" class="text-sm text-gray-500 hover:text-gray-700">← 返回案件列表</a>
      <button type="submit" class="px-6 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700">
        📤 送出案件
      </button>
    </div>
  </form>
</div>
<style>
  form input[type=text], form input[type=date], form textarea, form select {
    width: 100%; border: 1px solid #d1d5db; border-radius: 0.5rem;
    padding: 0.5rem 0.75rem; font-size: 0.875rem;
  }
</style>
{% endblock %}
