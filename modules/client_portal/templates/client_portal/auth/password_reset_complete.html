{% extends 'client_portal/auth/auth_base.html' %}
{% block title %}Aura 客戶服務中心 | 密碼重設完成{% endblock %}

{% block body %}
    <div style="width:100%; max-width:400px;">

        <!-- Logo -->
        <div style="text-align:center; margin-bottom:32px;">
            <div style="display:inline-flex; align-items:center; justify-content:center; width:44px; height:44px; background:var(--primary); border-radius:var(--radius-lg); margin-bottom:14px;">
                <span style="font-family:var(--font-serif); font-size:22px; font-weight:700; color:var(--fg-on-primary);">勤</span>
            </div>
            <div style="font-family:var(--font-serif); font-size:17px; font-weight:600; color:var(--fg1); letter-spacing:0.04em;">勤信會計</div>
            <div style="font-size:10.5px; color:var(--fg4); letter-spacing:0.18em; text-transform:uppercase; margin-top:2px;">Client Portal</div>
        </div>

        <!-- Card -->
        <div style="background:#fff; border:1px solid var(--border-subtle); border-radius:var(--radius-lg); padding:40px 32px; box-shadow:var(--shadow-md); text-align:center;">

            <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; background:var(--success-soft); border-radius:var(--radius-lg); margin-bottom:24px;">
                <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" style="color:var(--success);"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>

            <h2 style="margin:0 0 10px; font-family:var(--font-serif); font-size:22px; font-weight:600; color:var(--fg1);">密碼重設完成</h2>
            <p style="margin:0 0 32px; font-size:13.5px; color:var(--fg2); line-height:1.75;">
                您的密碼已成功更新，<br>現在可以使用新密碼登入系統。
            </p>

            <a href="{% url 'client_portal:login' %}"
               style="display:inline-flex; align-items:center; gap:6px; padding:10px 24px; background:var(--primary); color:var(--fg-on-primary); border-radius:var(--radius-md); font-size:13.5px; font-weight:500; text-decoration:none; letter-spacing:0.04em; transition:background var(--dur-med) var(--ease-out);"
               onmouseover="this.style.background='var(--primary-hover)'" onmouseout="this.style.background='var(--primary)'">
                前往登入
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </a>
        </div>

        <p style="text-align:center; font-size:11.5px; color:var(--fg4); margin-top:24px;">&copy; 2026 Aura 會計師事務所 保留所有權利。</p>
    </div>
{% endblock %}
