<!-- Client Sidebar -->
<aside style="background:#fff; border-right:1px solid var(--border-subtle); display:flex; flex-direction:column; flex-shrink:0; padding:24px 14px; transition:width 240ms var(--ease-out); overflow:hidden;"
       :style="sidebarOpen ? 'width:220px;' : 'width:64px;'">

    <!-- Logo -->
    <div style="display:flex; align-items:center; gap:10px; padding:0 6px 20px; border-bottom:1px solid var(--border-subtle); margin-bottom:16px; overflow:hidden;">
        <div style="width:34px; height:34px; border-radius:var(--radius-md); background:var(--primary); color:var(--fg-on-primary); display:flex; align-items:center; justify-content:center; font-family:var(--font-serif); font-weight:700; font-size:17px; flex-shrink:0;">勤</div>
        <div x-show="sidebarOpen" x-transition.opacity style="overflow:hidden; white-space:nowrap;">
            <div style="font-family:var(--font-serif); font-size:15px; font-weight:600; color:var(--fg1); letter-spacing:0.04em;">勤信會計</div>
            <div style="font-size:10px; color:var(--fg3); letter-spacing:0.18em; text-transform:uppercase; margin-top:1px;">Client Portal</div>
        </div>
    </div>

    <!-- Nav -->
    <nav style="flex:1; display:flex; flex-direction:column; gap:2px;">

        <a href="{% url 'client_portal:dashboard' %}"
           class="portal-nav-item {% if request.resolver_match.url_name == 'dashboard' %}portal-nav-active{% endif %}"
           :style="sidebarOpen ? 'padding:9px 12px; justify-content:flex-start; gap:10px;' : 'padding:10px; justify-content:center;'"
           :title="!sidebarOpen ? '概覽' : ''">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span x-show="sidebarOpen" style="white-space:nowrap;">概覽</span>
        </a>

        <a href="{% url 'client_portal:billing' %}"
           class="portal-nav-item {% if request.resolver_match.url_name == 'billing' %}portal-nav-active{% endif %}"
           :style="sidebarOpen ? 'padding:9px 12px; justify-content:flex-start; gap:10px;' : 'padding:10px; justify-content:center;'"
           :title="!sidebarOpen ? '帳單' : ''">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
            <span x-show="sidebarOpen" style="white-space:nowrap;">帳單</span>
        </a>

        <a href="{% url 'client_portal:vat_documents' %}"
           class="portal-nav-item {% if request.resolver_match.url_name == 'vat_documents' %}portal-nav-active{% endif %}"
           :style="sidebarOpen ? 'padding:9px 12px; justify-content:flex-start; gap:10px;' : 'padding:10px; justify-content:center;'"
           :title="!sidebarOpen ? '下載專區' : ''">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            <span x-show="sidebarOpen" style="white-space:nowrap;">下載專區</span>
        </a>

        <a href="{% url 'client_portal:shareholders' %}"
           class="portal-nav-item {% if request.resolver_match.url_name == 'shareholders' %}portal-nav-active{% endif %}"
           :style="sidebarOpen ? 'padding:9px 12px; justify-content:flex-start; gap:10px;' : 'padding:10px; justify-content:center;'"
           :title="!sidebarOpen ? '股東管理' : ''">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <span x-show="sidebarOpen" style="white-space:nowrap;">股東管理</span>
        </a>

        <a href="{% url 'client_portal:financial_analysis' %}"
           class="portal-nav-item {% if request.resolver_match.url_name == 'financial_analysis' %}portal-nav-active{% endif %}"
           :style="sidebarOpen ? 'padding:9px 12px; justify-content:flex-start; gap:10px;' : 'padding:10px; justify-content:center;'"
           :title="!sidebarOpen ? '財務分析' : ''">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span x-show="sidebarOpen" style="white-space:nowrap;">財務分析</span>
        </a>

        <a href="{% url 'client_portal:income_declaration' %}"
           class="portal-nav-item {% if request.resolver_match.url_name == 'income_declaration' %}portal-nav-active{% endif %}"
           :style="sidebarOpen ? 'padding:9px 12px; justify-content:flex-start; gap:10px;' : 'padding:10px; justify-content:center;'"
           :title="!sidebarOpen ? '各類所得申報' : ''">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <span x-show="sidebarOpen" style="white-space:nowrap;">各類所得申報</span>
        </a>

        <a href="{% url 'client_portal:dividend_declaration' %}"
           class="portal-nav-item {% if request.resolver_match.url_name == 'dividend_declaration' %}portal-nav-active{% endif %}"
           :style="sidebarOpen ? 'padding:9px 12px; justify-content:flex-start; gap:10px;' : 'padding:10px; justify-content:center;'"
           :title="!sidebarOpen ? '股利申報' : ''">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span x-show="sidebarOpen" style="white-space:nowrap;">股利申報</span>
        </a>

        <a href="{% url 'client_portal:service_remuneration' %}"
           class="portal-nav-item {% if request.resolver_match.url_name == 'service_remuneration' %}portal-nav-active{% endif %}"
           :style="sidebarOpen ? 'padding:9px 12px; justify-content:flex-start; gap:10px;' : 'padding:10px; justify-content:center;'"
           :title="!sidebarOpen ? '勞務報酬單' : ''">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            <span x-show="sidebarOpen" style="white-space:nowrap;">勞務報酬單</span>
        </a>

        <a href="{% url 'case_portal:list' %}"
           class="portal-nav-item {% if 'case_management' in request.resolver_match.namespaces|join:',' %}portal-nav-active{% endif %}"
           :style="sidebarOpen ? 'padding:9px 12px; justify-content:flex-start; gap:10px;' : 'padding:10px; justify-content:center;'"
           :title="!sidebarOpen ? '我的案件' : ''">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
            <span x-show="sidebarOpen" style="white-space:nowrap;">我的案件</span>
        </a>

    </nav>

    <!-- Bottom: Settings -->
    <div style="border-top:1px solid var(--border-subtle); padding-top:10px; margin-top:10px;">
        <a href="{% url 'client_portal:settings' %}"
           class="portal-nav-item {% if request.resolver_match.url_name == 'settings' %}portal-nav-active{% endif %}"
           :style="sidebarOpen ? 'padding:9px 12px; justify-content:flex-start; gap:10px;' : 'padding:10px; justify-content:center;'"
           :title="!sidebarOpen ? '設定' : ''">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span x-show="sidebarOpen" style="white-space:nowrap;">設定</span>
        </a>
    </div>

</aside>
