<!-- Client Sidebar -->
<aside class="flex flex-col h-screen py-8 overflow-y-auto bg-white border-r border-gray-200 transition-all duration-300 flex-shrink-0"
       :class="sidebarOpen ? 'w-64 px-4' : 'w-20 px-3'">
    
    <div class="flex items-center justify-center mb-8 h-10">
        <a href="{% url 'client_portal:dashboard' %}" class="flex items-center justify-center gap-2 font-black tracking-wide text-indigo-700 w-full overflow-hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-600 shrink-0" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10.496 2.132a1 1 0 00-.992 0l-7 4A1 1 0 003 8v7a2 2 0 002 2h10a2 2 0 002-2V8a1 1 0 00-.504-.868l-7-4zM6 9a1 1 0 00-1 1v3a1 1 0 102 0v-3a1 1 0 00-1-1zm3 1a1 1 0 012 0v3a1 1 0 11-2 0v-3zm5-1a1 1 0 00-1 1v3a1 1 0 102 0v-3a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
            <span x-show="sidebarOpen" class="text-xl whitespace-nowrap" x-transition>Aura 稅務中心</span>
        </a>
    </div>

    <div class="flex flex-col justify-between flex-1 mt-6">
        <nav>
            <div class="space-y-1">
                <!-- 概覽 -->
                <a class="flex items-center py-2.5 text-sm font-medium transition-colors rounded-lg {% if request.resolver_match.url_name == 'dashboard' %}text-indigo-700 bg-indigo-50{% else %}text-gray-600 hover:text-indigo-600 hover:bg-gray-50{% endif %}"
                   :class="sidebarOpen ? 'px-4 justify-start' : 'px-0 justify-center'"
                   href="{% url 'client_portal:dashboard' %}"
                   :title="!sidebarOpen ? '概覽' : ''">
                    <svg class="w-6 h-6 shrink-0" :class="{'mr-3': sidebarOpen}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    <span x-show="sidebarOpen" class="whitespace-nowrap">概覽</span>
                </a>
                
                <!-- 下載專區 -->
                <a class="flex items-center py-2.5 text-sm font-medium transition-colors rounded-lg {% if request.resolver_match.url_name == 'vat_documents' %}text-indigo-700 bg-indigo-50{% else %}text-gray-600 hover:text-indigo-600 hover:bg-gray-50{% endif %}"
                   :class="sidebarOpen ? 'px-4 justify-start' : 'px-0 justify-center'"
                   href="{% url 'client_portal:vat_documents' %}"
                   :title="!sidebarOpen ? '下載專區' : ''">
                    <svg class="w-6 h-6 shrink-0" :class="{'mr-3': sidebarOpen}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    <span x-show="sidebarOpen" class="whitespace-nowrap">下載專區</span>
                </a>

                <!-- 股東管理 -->
                <a class="flex items-center py-2.5 text-sm font-medium transition-colors rounded-lg {% if request.resolver_match.url_name == 'shareholders' %}text-indigo-700 bg-indigo-50{% else %}text-gray-600 hover:text-indigo-600 hover:bg-gray-50{% endif %}"
                   :class="sidebarOpen ? 'px-4 justify-start' : 'px-0 justify-center'"
                   href="{% url 'client_portal:shareholders' %}"
                   :title="!sidebarOpen ? '股東管理' : ''">
                    <svg class="w-6 h-6 shrink-0" :class="{'mr-3': sidebarOpen}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <span x-show="sidebarOpen" class="whitespace-nowrap">股東管理</span>
                </a>

                <!-- 財務分析 -->
                <a class="flex items-center py-2.5 text-sm font-medium transition-colors rounded-lg {% if request.resolver_match.url_name == 'financial_analysis' %}text-indigo-700 bg-indigo-50{% else %}text-gray-600 hover:text-indigo-600 hover:bg-gray-50{% endif %}"
                   :class="sidebarOpen ? 'px-4 justify-start' : 'px-0 justify-center'"
                   href="{% url 'client_portal:financial_analysis' %}"
                   :title="!sidebarOpen ? '財務分析' : ''">
                    <svg class="w-6 h-6 shrink-0" :class="{'mr-3': sidebarOpen}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                    <span x-show="sidebarOpen" class="whitespace-nowrap">財務分析</span>
                </a>

                <!-- 各類所得申報 -->
                <a class="flex items-center py-2.5 text-sm font-medium transition-colors rounded-lg {% if request.resolver_match.url_name == 'income_declaration' %}text-indigo-700 bg-indigo-50{% else %}text-gray-600 hover:text-indigo-600 hover:bg-gray-50{% endif %}"
                   :class="sidebarOpen ? 'px-4 justify-start' : 'px-0 justify-center'"
                   href="{% url 'client_portal:income_declaration' %}"
                   :title="!sidebarOpen ? '各類所得申報' : ''">
                    <svg class="w-6 h-6 shrink-0" :class="{'mr-3': sidebarOpen}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    <span x-show="sidebarOpen" class="whitespace-nowrap">各類所得申報</span>
                </a>

                <!-- 股利申報 -->
                <a class="flex items-center py-2.5 text-sm font-medium transition-colors rounded-lg {% if request.resolver_match.url_name == 'dividend_declaration' %}text-indigo-700 bg-indigo-50{% else %}text-gray-600 hover:text-indigo-600 hover:bg-gray-50{% endif %}"
                   :class="sidebarOpen ? 'px-4 justify-start' : 'px-0 justify-center'"
                   href="{% url 'client_portal:dividend_declaration' %}"
                   :title="!sidebarOpen ? '股利申報' : ''">
                    <svg class="w-6 h-6 shrink-0" :class="{'mr-3': sidebarOpen}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <span x-show="sidebarOpen" class="whitespace-nowrap">股利申報</span>
                </a>

                <!-- 勞務報酬單 -->
                <a class="flex items-center py-2.5 text-sm font-medium transition-colors rounded-lg {% if request.resolver_match.url_name == 'service_remuneration' %}text-indigo-700 bg-indigo-50{% else %}text-gray-600 hover:text-indigo-600 hover:bg-gray-50{% endif %}"
                   :class="sidebarOpen ? 'px-4 justify-start' : 'px-0 justify-center'"
                   href="{% url 'client_portal:service_remuneration' %}"
                   :title="!sidebarOpen ? '勞務報酬單' : ''">
                    <svg class="w-6 h-6 shrink-0" :class="{'mr-3': sidebarOpen}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    <span x-show="sidebarOpen" class="whitespace-nowrap">勞務報酬單</span>
                </a>

                <!-- 分隔線 -->
                <div class="my-4 border-t border-gray-200"></div>

                <!-- 設定 -->
                <a class="flex items-center py-2.5 text-sm font-medium transition-colors rounded-lg {% if request.resolver_match.url_name == 'settings' %}text-indigo-700 bg-indigo-50{% else %}text-gray-600 hover:text-indigo-600 hover:bg-gray-50{% endif %}"
                   :class="sidebarOpen ? 'px-4 justify-start' : 'px-0 justify-center'"
                   href="{% url 'client_portal:settings' %}"
                   :title="!sidebarOpen ? '設定' : ''">
                    <svg class="w-6 h-6 shrink-0" :class="{'mr-3': sidebarOpen}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    <span x-show="sidebarOpen" class="whitespace-nowrap">設定</span>
                </a>

            </div>
        </nav>
    </div>
</aside>
