{% extends 'client_portal/portal_base.html' %}

{% block page_title %}各類所得申報{% endblock %}

{% block content %}
<div class="flex items-center justify-center h-full min-h-[60vh]">
    <div class="text-center max-w-md mx-auto">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-yellow-50 mb-6 border-4 border-white shadow-sm">
            <svg class="h-10 w-10 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-2">尚未開放填寫</h2>
        <p class="text-gray-500 mb-6">各類所得申報功能目前尚未到申報期間，或系統維護中。有任何問題請洽詢專員。</p>
        <a href="{% url 'client_portal:dashboard' %}" class="inline-flex items-center justify-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
            返回首頁儀表板
        </a>
    </div>
</div>
{% endblock %}
