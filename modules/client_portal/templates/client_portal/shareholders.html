{% extends 'client_portal/portal_base.html' %}

{% block page_title %}股東管理{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="sm:flex sm:justify-between sm:items-center mb-2">
        <div class="mb-4 sm:mb-0">
            <h1 class="text-xl md:text-2xl text-slate-800 font-bold">股東名冊 (準備中)</h1>
        </div>
    </div>

    <!-- Placeholder Widget -->
    <div class="bg-white rounded-lg shadow border border-gray-200 p-12 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-50 mb-4">
            <svg class="h-8 w-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
        </div>
        <h3 class="text-lg font-medium text-gray-900 mb-2">股東管理模組建置中</h3>
        <p class="text-sm text-gray-500 max-w-sm mx-auto">
            未來此區塊將連結公司登記模組，讓您可以即時檢視公司股東名冊、持有股數與相關資訊。
        </p>
    </div>
</div>
{% endblock %}
