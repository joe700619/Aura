<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>記帳服務委任書 - {{ letter.company_name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center py-8 px-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 text-center">
    {% if declined %}
      <div class="w-16 h-16 mx-auto rounded-full bg-slate-100 flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </div>
      <h1 class="text-xl font-bold text-slate-800 mb-2">已收到您的回覆</h1>
      <p class="text-slate-600 text-sm">您選擇暫不委任，我們已記錄。如後續有需要，歡迎再與本所聯繫。</p>
    {% else %}
      <div class="w-16 h-16 mx-auto rounded-full bg-green-100 flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      </div>
      <h1 class="text-xl font-bold text-slate-800 mb-2">委任已成立</h1>
      <p class="text-slate-600 text-sm">感謝您委任本所辦理記帳服務。我們將盡快指派專人與您聯繫、安排後續資料交接。</p>
      <p class="text-slate-400 text-xs mt-4">{{ letter.company_name }}・{{ letter.signed_at|date:"Y-m-d H:i" }}</p>
    {% endif %}
  </div>
</body>
</html>
