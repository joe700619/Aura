{% extends 'base.html' %}

{% block header %}刪除確認{% endblock %}

{% block content %}
<div class="container mx-auto px-4 max-w-lg mt-10">
    <div class="bg-white shadow-md rounded-lg p-6 text-center">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center text-red-600 mx-auto mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        <h3 class="text-xl font-bold text-slate-900 mb-2">確認刪除</h3>
        <p class="text-slate-600 mb-6">您確定要刪除這筆國稅局查帳通知 <strong>「{{ object.subject }}」</strong> 嗎？<br>此操作無法復原，相關的溝通紀錄也會一併刪除。</p>

        <form method="post">
            {% csrf_token %}
            <div class="flex justify-center gap-3">
                <a href="{% url 'administrative:irs_audit_notice_list' %}"
                    class="bg-white hover:bg-slate-50 text-slate-700 font-medium py-2 px-6 border border-slate-300 rounded-lg transition-colors duration-150">取消</a>
                <button type="submit"
                    class="bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-6 rounded-lg shadow-sm transition-colors duration-150 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    確認刪除
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
