{% extends 'base.html' %}

{% block header %}
{% block page_title %}刪除確認{% endblock %}
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="px-6 py-8">
            <div class="flex items-center justify-center mb-6">
                <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                    <svg class="h-6 w-6 text-red-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
            </div>
            
            <h2 class="text-xl font-bold text-center text-slate-900 mb-2">確認刪除</h2>
            <p class="text-center text-slate-600 mb-8">
                您確定要刪除代墊款紀錄「<span class="font-bold text-slate-800">{{ object.advance_no }}</span>」嗎？<br>
                此操作無法復原。
            </p>

            <form method="post">
                {% csrf_token %}
                <div class="flex justify-center space-x-4">
                    <a href="{% url 'administrative:advance_payment_list' %}"
                        class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded">
                        取消
                    </a>
                    <button type="submit"
                        class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-150">
                        確認刪除
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
