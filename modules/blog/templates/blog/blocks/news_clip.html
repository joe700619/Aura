<div class="news-clip">
  <div class="nc-meta">
    <span class="nc-source">{{ value.source }}</span>
    {% if value.date %}<span>{{ value.date }}</span>{% endif %}
  </div>
  <div class="nc-title">{{ value.title }}</div>
  <div class="nc-quote">{{ value.quote|linebreaksbr }}</div>
  {% if value.link %}<a class="nc-link" href="{{ value.link }}" target="_blank" rel="noopener">原文連結 →</a>{% endif %}
</div>
