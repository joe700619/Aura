{% for shareholder in shareholders %}
<tr class="hover:bg-blue-50 cursor-pointer transition-colors"
    @click="selectItem('{{ shareholder.name|escapejs }}', '{{ shareholder.name|escapejs }} ({{ shareholder.id_number|escapejs }})', { 
        'shareholder_name': '{{ shareholder.name|escapejs }}', 
        'shareholder_id_number': '{{ shareholder.id_number|escapejs }}', 
        'shareholder_address': '{{ shareholder.address|default:""|escapejs }}',
        'shareholder_nationality': '{{ shareholder.get_nationality_display|escapejs }}',
        'shareholder_birthday': '{{ shareholder.birthday|date:"Y-m-d"|default:""|escapejs }}'
    })">
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm font-medium text-gray-900">{{ shareholder.name }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm text-gray-900">{{ shareholder.id_number }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm text-gray-500">{{ shareholder.address|default:"" }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap text-right text-sm font-medium">
        <button type="button" class="text-blue-600 hover:text-blue-900">選擇</button>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="4" class="px-6 py-4 text-center text-sm text-gray-500">
        沒有找到符合的結果
    </td>
</tr>
{% endfor %}
