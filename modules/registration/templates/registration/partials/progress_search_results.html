{% for progress in progress_list %}
<tr class="hover:bg-blue-50 cursor-pointer transition-colors"
    @click="selectItem('{{ progress.registration_no|escapejs }}', '{{ progress.registration_no|escapejs }} {{ progress.company_name|escapejs }}', { 'registration_no': '{{ progress.registration_no|escapejs }}', 'unified_business_no': '{{ progress.unified_business_no|default:''|escapejs }}', 'company_name': '{{ progress.company_name|escapejs }}', 'line_id': '{{ progress.line_id|default:''|escapejs }}', 'room_id': '{{ progress.room_id|default:''|escapejs }}', 'main_contact': '{{ progress.main_contact|default:''|escapejs }}', 'mobile': '{{ progress.mobile|default:''|escapejs }}', 'phone': '{{ progress.phone|default:''|escapejs }}', 'address': '{{ progress.address|default:''|escapejs }}' })">
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm font-medium text-gray-900">{{ progress.registration_no }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm text-gray-900">{{ progress.company_name }}</div>
        <div class="text-xs text-gray-500">{{ progress.unified_business_no|default:"" }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap text-right text-sm font-medium">
        <button type="button" class="text-blue-600 hover:text-blue-900">選擇</button>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">
        沒有找到符合的結果
    </td>
</tr>
{% endfor %}
