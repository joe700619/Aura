{% for register in registers %}
<tr class="hover:bg-slate-50 cursor-pointer" data-id="{{ register.id }}" data-title="{{ register.company_name }}"
    data-ubn="{{ register.unified_business_no }}">
    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-900">{{ register.company_name }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{{ register.unified_business_no }}</td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{{ register.get_service_status_display }}</td>
</tr>
{% endfor %}
