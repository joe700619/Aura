{% for assessment in client_assessments %}
<tr class="hover:bg-blue-50 cursor-pointer transition-colors"
    @click="selectItem('{{ assessment.id }}', '{{ assessment.company_name|escapejs }} ({{ assessment.main_contact|escapejs }})', { 'company_name': '{{ assessment.company_name|escapejs }}', 'unified_business_no': '{{ assessment.unified_business_no|default:''|escapejs }}', 'line_id': '{{ assessment.line_id|default:''|escapejs }}', 'room_id': '{{ assessment.room_id|default:''|escapejs }}', 'main_contact': '{{ assessment.main_contact|default:''|escapejs }}', 'mobile': '{{ assessment.mobile|default:''|escapejs }}', 'phone': '{{ assessment.phone|default:''|escapejs }}', 'address': '{{ assessment.address|default:''|escapejs }}', 'search_customer': '{{ assessment.id }}' })">
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm font-medium text-gray-900">{{ assessment.company_name }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm text-gray-500">{{ assessment.unified_business_no|default:"-" }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap text-right text-sm font-medium">
        <button type="button" class="text-blue-600 hover:text-blue-900">選擇</button>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">
        沒有找到符合的結果
    </td>
</tr>
{% endfor %}
