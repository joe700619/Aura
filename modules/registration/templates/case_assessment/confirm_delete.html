{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto mt-8 p-6 bg-white rounded-lg shadow-md border border-slate-200">
    <h3 class="text-lg font-bold text-slate-800 mb-4">確認刪除</h3>
    <p class="text-slate-600 mb-6">您確定要刪除此案件評估紀錄 "<strong>{{ object }}</strong>" 嗎？此動作無法復原。</p>

    <form method="post">
        {% csrf_token %}
        <div class="flex justify-end space-x-4">
            <a href="{% url 'registration:case_assessment_list' %}"
                class="px-4 py-2 bg-slate-100 text-slate-700 rounded-md hover:bg-slate-200 transition-colors">
                取消
            </a>
            <button type="submit"
                class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors shadow-sm">
                確定刪除
            </button>
        </div>
    </form>
</div>
{% endblock %}
