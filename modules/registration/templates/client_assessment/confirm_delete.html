{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <div class="bg-red-50 px-6 py-4 border-b border-red-100 flex items-center">
            <div class="bg-red-100 rounded-full p-2 mr-3">
                <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-lg font-bold text-red-800">確認刪除</h3>
        </div>

        <div class="p-6">
            <p class="text-slate-700 mb-4">
                您確定要刪除客戶評估表
                <span class="font-bold text-slate-900">{{ object.company_name }}</span>
                嗎？
            </p>
            <p class="text-sm text-slate-500 bg-slate-50 p-3 rounded border border-slate-200">
                此操作無法復原，所有相關資料將被永久刪除。
            </p>
        </div>

        <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end space-x-3">
            <form method="post">
                {% csrf_token %}
                <div class="flex justify-end space-x-3">
                    <a href="{% url 'registration:client_assessment_list' %}"
                        class="px-4 py-2 border border-slate-300 rounded-md text-slate-700 hover:bg-slate-50 transition-colors">
                        取消
                    </a>
                    <button type="submit"
                        class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors shadow-sm">
                        確認刪除
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
