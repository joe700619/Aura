{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-lg shadow-lg overflow-hidden border border-slate-200">
        <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
            <h3 class="text-lg font-bold text-slate-800">確認刪除</h3>
        </div>
        <div class="p-6">
            <p class="text-slate-600 mb-6">
                確定要刪除這筆 <span class="font-bold text-slate-800">登記進度</span> 紀錄嗎？此動作無法復原。
            </p>
            <div class="bg-slate-50 rounded-lg p-4 mb-6 border border-slate-100">
                <p class="text-sm text-slate-700 mb-2">
                    <span class="font-semibold text-slate-500 w-24 inline-block">登記單號：</span> 
                    <span class="text-slate-900 font-medium">{{ object.registration_no }}</span>
                </p>
                <p class="text-sm text-slate-700 mb-2">
                    <span class="font-semibold text-slate-500 w-24 inline-block">公司名稱：</span> 
                    <span class="text-slate-900 font-medium">{{ object.company_name }}</span>
                </p>
                <p class="text-sm text-slate-700">
                    <span class="font-semibold text-slate-500 w-24 inline-block">統一編號：</span> 
                    <span class="text-slate-900 font-medium">{{ object.unified_business_no|default:"-" }}</span>
                </p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="flex justify-end space-x-3">
                    <a href="{% url 'registration:progress_list' %}"
                        class="px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-md hover:bg-slate-50 transition-colors text-sm font-medium">
                        取消
                    </a>
                    <button type="submit"
                        class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors shadow-sm text-sm font-bold">
                        確認刪除
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
