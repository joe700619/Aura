{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100">
            <h3 class="text-lg font-medium text-gray-900">確認刪除</h3>
        </div>
        <div class="p-6">
            <p class="text-gray-600 mb-6">
                確定要刪除這筆股東名簿查詢紀錄嗎？此動作無法復原。
            </p>
            <div class="bg-gray-50 rounded p-4 mb-6">
                <p class="text-sm text-gray-700"><span class="font-medium">公司名稱：</span> {{ object.company_name }}</p>
                <p class="text-sm text-gray-700 mt-1"><span class="font-medium">統一編號：</span> {{
                    object.unified_business_no }}</p>
                <p class="text-sm text-gray-700 mt-1"><span class="font-medium">完成狀態：</span> {{
                    object.get_completion_status_display }}</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="flex justify-end space-x-3">
                    <a href="{% url 'registration:shareholder_register_list' %}"
                        class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 transition-colors">
                        取消
                    </a>
                    <button type="submit"
                        class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors shadow-sm">
                        確認刪除
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
