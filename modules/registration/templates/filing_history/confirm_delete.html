{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="max-w-2xl mx-auto mt-16 px-4">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="p-8 text-center">
            <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            
            <h2 class="text-2xl font-bold text-slate-900 mb-2">確認刪除申報明細？</h2>
            <p class="text-slate-500 mb-8">您即將刪除年度為 <span class="font-bold text-slate-800">{{ object.year }}</span> 的申報紀錄。此動作無法復原，且會導致進度表中的關聯失效。</p>
            
            <form method="post" class="flex flex-col sm:flex-row gap-3 justify-center">
                {% csrf_token %}
                <button type="submit" class="inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-bold rounded-xl shadow-sm text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-all">
                    確認刪除
                </button>
                <a href="{% url 'registration:company_filing_edit' object.company_filing.pk %}" class="inline-flex justify-center items-center px-6 py-3 border border-slate-300 text-base font-bold rounded-xl text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all">
                    取消並返回
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
