{% extends 'layouts/base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <div class="px-6 py-4 bg-red-600 border-b border-red-700">
            <h3 class="text-lg font-bold text-white">確認刪除</h3>
        </div>
        <div class="p-6">
            <p class="text-slate-700 mb-6">
                您確定要刪除服務項目 <strong>{{ object.name }}</strong> ({{ object.service_id }}) 嗎？此動作無法復原。
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="flex justify-end space-x-3">
                    <a href="{% url 'service_item_list' %}"
                        class="px-4 py-2 border border-slate-300 rounded-md text-slate-700 hover:bg-slate-50">
                        取消
                    </a>
                    <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
                        確認刪除
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
