{% extends 'base.html' %}

{% block header %}營業稅紀錄{% endblock %}

{% block content %}
<div class="container mx-auto px-4 pb-8">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-slate-800">營業稅申報列表</h2>
        <button
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200 inline-flex items-center shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            新增申報
        </button>
    </div>

    <div class="bg-white shadow-sm rounded-xl overflow-hidden border border-slate-200">
        <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50">
                <tr>
                    <th scope="col"
                        class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">申報期間
                    </th>
                    <th scope="col"
                        class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">應納稅額
                    </th>
                    <th scope="col"
                        class="px-6 py-4 text-center text-xs font-semibold text-slate-500 uppercase tracking-wider">操作
                    </th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-slate-100">
                {% for record in vat_records %}
                <tr class="hover:bg-slate-50 transition duration-150">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="text-sm font-bold text-slate-700">{{ record.period }}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="text-sm text-slate-600">${{ record.tax_amount|default:"0" }}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium">
                        <div class="flex justify-center space-x-3">
                            <a href="#" class="text-blue-600 hover:text-blue-800" title="檢視">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </a>
                        </div>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="px-6 py-10 text-center text-slate-500 italic">
                        目前尚無營業稅申報紀錄
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
