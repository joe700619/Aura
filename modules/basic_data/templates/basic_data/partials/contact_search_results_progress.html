{% for contact in contacts %}
<tr class="hover:bg-blue-50 cursor-pointer transition-colors"
    onclick="this.dispatchEvent(new CustomEvent('select-item', {
        bubbles: true,
        detail: {
            value: '{{ contact.id }}',
            label: '{{ contact.name|escapejs }}',
            extra: {
                'main_contact': '{{ contact.name|escapejs }}',
                'mobile': '{{ contact.mobile|escapejs }}',
                'phone': '{{ contact.phone|escapejs }}',
                'email': '{{ contact.email|escapejs }}',
                'address': '{{ contact.address|escapejs }}'
            }
        }
    }))">
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm font-medium text-gray-900">{{ contact.name }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm text-gray-500">{{ contact.phone|default:"-" }} / {{ contact.mobile|default:"-" }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap text-right text-sm font-medium">
        <button type="button" class="text-blue-600 hover:text-blue-900">選擇</button>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">
        沒有找到符合的結果
    </td>
</tr>
{% endfor %}
