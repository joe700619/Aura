{% for customer in customers %}
<tr class="hover:bg-blue-50 cursor-pointer transition-colors"
    onclick="this.dispatchEvent(new CustomEvent('select-item', { bubbles: true, detail: { value: '{{ customer.id }}', label: '{{ customer.name|escapejs }}', extra: { 'tax_id': '{{ customer.tax_id|default:''|escapejs }}', 'name': '{{ customer.name|escapejs }}', 'line_id': '{{ customer.line_id|default:''|escapejs }}', 'room_id': '{{ customer.room_id|default:''|escapejs }}', 'contact_person': '{{ customer.contact_person|default:''|escapejs }}', 'phone': '{{ customer.phone|default:''|escapejs }}', 'mobile': '{{ customer.mobile|default:''|escapejs }}', 'email': '{{ customer.email|default:''|escapejs }}', 'correspondence_address': '{{ customer.correspondence_address|default:''|escapejs }}', 'registered_address': '{{ customer.registered_address|default:''|escapejs }}' } } }))">
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm font-medium text-gray-900">{{ customer.name }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm text-gray-500">{{ customer.tax_id|default:"-" }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap text-right text-sm font-medium">
        <button type="button" class="text-blue-600 hover:text-blue-900">選擇</button>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">
        沒有找到符合的結果
    </td>
</tr>
{% endfor %}
