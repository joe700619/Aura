{% for customer in customers %}
<tr class="hover:bg-blue-50 cursor-pointer transition-colors"
    @click="selectItem('{{ customer.name|escapejs }}', '{{ customer.name|escapejs }}', { 'unified_business_no': '{{ customer.tax_id|default:''|escapejs }}', 'company_name': '{{ customer.name|escapejs }}', 'line_id': '{{ customer.line_id|default:''|escapejs }}', 'room_id': '{{ customer.room_id|default:''|escapejs }}' })">
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm font-medium text-gray-900">{{ customer.name }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm text-gray-500">{{ customer.tax_id|default:"-" }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap text-right text-sm font-medium">
        <button type="button" class="text-blue-600 hover:text-blue-900">選擇</button>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">
        沒有找到符合的結果
    </td>
</tr>
{% endfor %}
