{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-12">
    <div class="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
        <div class="p-8">
            <div class="flex items-center justify-center w-16 h-16 bg-red-100 rounded-full mx-auto mb-6">
                <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            
            <h2 class="text-2xl font-bold text-center text-slate-800 mb-4">確認刪除傳票？</h2>
            <p class="text-center text-slate-600 mb-8">您確定要刪除傳票 <span class="font-bold text-slate-900">{{ object.voucher_no }}</span> 嗎？此操作無法復原。</p>
            
            <form method="post" class="flex flex-col sm:flex-row gap-4 justify-center">
                {% csrf_token %}
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-8 rounded-lg transition-colors">確認刪除</button>
                <a href="{% url 'internal_accounting:voucher_list' %}" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 px-8 rounded-lg text-center transition-colors">取消</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
