{% for item in receivables %}
<tr class="hover:bg-blue-50 cursor-pointer transition-colors"
    @click="selectItem('{{ item.pk }}', '{{ item.receivable_no|default:item.company_name|escapejs }}', { 
        'receivable': '{{ item.pk }}',
        'receivable_no': '{{ item.receivable_no|default:''|escapejs }}',
        'company_name': '{{ item.company_name|escapejs }}', 
        'unified_business_no': '{{ item.unified_business_no|default:''|escapejs }}',
        'address': '{{ item.address|default:''|escapejs }}',
        'outstanding_balance': '{{ item.outstanding_balance|default:0|escapejs }}'
    })">
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm font-medium text-gray-900">{{ item.receivable_no|default:"-" }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm text-gray-900">{{ item.company_name }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap">
        <div class="text-sm text-gray-500">{{ item.unified_business_no|default:"-" }}</div>
    </td>
    <td class="px-6 py-3 whitespace-nowrap text-right text-sm font-medium">
        <button type="button" class="text-blue-600 hover:text-blue-900">選擇</button>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="4" class="px-6 py-4 text-center text-sm text-gray-500">
        沒有找到符合的結果
    </td>
</tr>
{% endfor %}
